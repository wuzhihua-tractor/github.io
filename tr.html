<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>验真结果</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      outline: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body,
    html {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      max-width: 1080px;
      overflow-x: hidden;
      margin: 0 auto !important;
    }

    /* .demo_case {
      width: 100%;
    }

    img {
      width: 10rem
    } */

    img {
      max-width: 954px;
      max-height: 522px;
    }
  </style>
</head>

<body>

  <script>


    function GetQueryString(name) {
      var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)");
      var r = window.location.search.substr(1).match(reg);
      if (r != null) return unescape(r[2]); return null;
    }

    window.onload = function () {

      try {

        var imgCode = GetQueryString('imgCode');

        console.log(imgCode);

        var imgDom = document.createElement('img');
        imgDom.src = './images/tr/' + imgCode + '.png';

        document.body.appendChild(imgDom);

      } catch (ex) {
        console.warn(ex);
      }

    }

  </script>
</body>

</html>
